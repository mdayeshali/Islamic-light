<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004d40">
    <title>Articles – Islamic Light</title>

    <link rel="stylesheet" href="/css/articles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Header -->
<div id="header"></div>

<!-- Search Section -->
<div class="search-section">
    <div class="search-wrap">
        <form action="" method="GET" class="search-form" onsubmit="return false;">
            <div class="search-input-group">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="article-search" placeholder="পছন্দের আর্টিকেলটি খুঁজুন..." autocomplete="off">
                <button type="button" id="clear-search" class="clear-btn" style="display: none;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Article Feed -->
<div class="article-feed">

    <!-- Auto Articles Container -->
    <div id="article-container"></div>

</div>

<!-- Footer -->
<div id="footer"></div>

<!-- Scripts -->
<script src="/js/articles.js"></script>
<script src="/js/script.js"></script>

</body>
</html>
