<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>যোগাযোগ — Islamic Light</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --bg: #f7fafc;
      --text: #222;
      --primary: #004d40;
      --accent: #009688;
      --card-bg: #ffffff;
    }

    body {
      margin: 0;
      font-family: "Noto Sans Bengali", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ---------- HERO ---------- */
    .hero {
      background: linear-gradient(to right, #004d40, #00796b);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ---------- FORM ---------- */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      border-top: 4px solid var(--primary);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: 600;
      color: var(--primary);
    }

    input, textarea {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 6px rgba(0,150,136,0.3);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: var(--accent);
    }

    /* ---------- SUCCESS POPUP ---------- */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: #e8f5e9;
      color: #1b5e20;
      border: 2px solid #81c784;
      padding: 25px 35px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      opacity: 0;
      z-index: 9999;
      transition: all 0.4s ease-in-out;
      pointer-events: none;
    }

    .popup.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { transform: translate(-50%, 20%) scale(0.8); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* ---------- CONTACT INFO ---------- */
    .contact-info {
      background: var(--card-bg);
      margin-top: 30px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      border-left: 5px solid var(--primary);
    }

    .contact-info h3 {
      margin-top: 0;
      color: var(--primary);
      font-size: 1.3rem;
      margin-bottom: 15px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
      text-decoration: none;
      color: var(--text);
      transition: 0.3s;
    }

    .info-item:hover {
      color: var(--accent);
    }

    .info-item i {
      width: 25px;
      font-size: 1.2rem;
      text-align: center;
    }

    .icon-email { color: #ea4335; }
    .icon-twitter { color: #000000; }
    .icon-facebook { color: #1877f2; }

  </style>
  
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="header"></div>

  <section class="hero">
    <h1>যোগাযোগ করুন</h1>
    <p>Islamic Light-এর সঙ্গে যুক্ত থাকুন — আপনার মতামত, প্রশ্ন ও পরামর্শ আমাদের জন্য মূল্যবান।</p>
  </section>

  <main class="container">
    <div class="card">
      <form id="contactForm" action="https://formspree.io/f/movyqwoa" method="POST">
        <label for="name">আপনার নাম</label>
        <input type="text" id="name" name="name" placeholder="আপনার নাম লিখুন" required>

        <label for="email">ইমেইল</label>
        <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>

        <label for="message">বার্তা</label>
        <textarea id="message" name="message" placeholder="আপনার বার্তা লিখুন..." required></textarea>

        <input type="hidden" name="_subject" value="📬 নতুন বার্তা - Islamic Light">
        <input type="hidden" name="_language" value="bn">
        <input type="hidden" name="_captcha" value="false">

        <button type="submit">✉️ বার্তা পাঠান</button>
      </form>
    </div>

    <div class="contact-info">
      <h3>📬 অন্যান্য যোগাযোগ মাধ্যম</h3>
      
      <a href="mailto:mdayeshali433@gmail.com" class="info-item">
        <i class="fa-solid fa-envelope icon-email"></i>
        <span><strong>ইমেইল:</strong> mdayeshali433@gmail.com</span>
      </a>

      <a href="https://twitter.com/@md_ali71187" target="_blank" class="info-item">
        <i class="fa-brands fa-x-twitter icon-twitter"></i>
        <span><strong>টুইটার (X):</strong> আমাদের টুইটার প্রোফাইল</span>
      </a>

      <a href="https://www.facebook.com/profile.php?id=61573783316016" target="_blank" class="info-item">
        <i class="fa-brands fa-facebook icon-facebook"></i>
        <span><strong>ফেসবুক:</strong> Noor-e-hidayah</span>
      </a>
    </div>
  </main>

  <div id="popup" class="popup">✅ আপনার বার্তাটি সফলভাবে পাঠানো হয়েছে!</div>

  <div id="footer"></div>

  <script>
    // Popup Success Animation
    const contactForm = document.getElementById("contactForm");
    const popup = document.getElementById("popup");

    contactForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(contactForm);
      const response = await fetch(contactForm.action, {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      if (response.ok) {
        contactForm.reset();
        popup.classList.add("active");
        setTimeout(() => popup.classList.remove("active"), 5000);
      } else {
        alert("❌ বার্তা পাঠাতে সমস্যা হয়েছে। অনুগ্রহ করে পুনরায় চেষ্টা করুন।");
      }
    });
  </script>

  <script src="js/script.js" defer></script>
</body>
</html>
